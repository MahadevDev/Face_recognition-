<!doctype html>
<html lang="en">

<style type='text/css'>
    * {
        padding: 0;
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }


    body {
        background-image: url('https://cutewallpaper.org/21/1920-x-1080-gif/1920x1080-Wallpapercartoon-Wallpapers-Driverlayer-Search-.gif');
        background-size: cover;
        font-family: sans-serif;
        margin-top: 40px;
        height: 100vh;
        padding: 0;
        margin: 0;
    }

    table {
        border: 1px;
        font-family: arial, sans-serif;
        border-collapse: collapse;
        width: 50%;
        margin: auto;
    }

    td,
    th {
        border: 1px solid black !important;
        padding: 5px;
    }

    tr:nth-child(even) {
        background-color: #dddddd;
    }
</style>


<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link href="/static/styles.css" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">

    <title>Face Recognition Based Attendance System</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Attendance</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsExample" aria-controls="navbarsExample" aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarsExample">
              <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="/take">Take Attendance</a></li>
                <li class="nav-item"><a class="nav-link" href="/history">History</a></li>
                <li class="nav-item"><a class="nav-link" href="/inspect">Inspect</a></li>
              </ul>
              <form class="d-flex" action="/logout" method="post">
                <button class="btn btn-outline-light" type="submit">Logout</button>
              </form>
            </div>
        </div>
    </nav>

    <div class='mt-3 text-center'>
        <h1 style="width: auto;margin: auto;color: rgb(140, 35, 35);padding: 11px;font-size: 44px;">Face Recognition Based
            Attendance System</h1>
        <p class="text-muted"></p>
    </div>

    {% if mess%}
    <p class="text-center" style="color: red;font-size: 20px;">{{ mess }}</p>
    {% endif %}

    <div class="container login-box">
        <h4 class="mb-3 text-center">Add New User</h4>
        <form action='/add' method="POST" enctype="multipart/form-data">
            <div class="mb-2">
                <label for="newusername" class="form-label">Enter New User Name*</label>
                <input type="text" id="newusername" name='newusername' class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="newusereid" class="form-label">Enter New User Id*</label>
                <input type="number" id="newusereid" name='newuserid' class="form-control" required>
            </div>
            <button type='submit' class='btn btn-primary w-100'>Add New User</button>
            <div class="text-center mt-3">
                <small class="text-muted">Total Users in Database: {{totalreg}}</small>
            </div>
        </form>
    </div>

</body>

</html>
