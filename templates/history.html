<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Attendance History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/styles.css" rel="stylesheet">
  </head>
  <body class="p-4">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-3">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">Attendance</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="/take">Take Attendance</a></li>
            <li class="nav-item"><a class="nav-link active" href="/history">History</a></li>
            <li class="nav-item"><a class="nav-link" href="/inspect">Inspect</a></li>
          </ul>
          <form class="d-flex" action="/logout" method="post">
            <button class="btn btn-outline-light" type="submit">Logout</button>
          </form>
        </div>
      </div>
    </nav>
    <div class="container">
      <h2 class="mb-3">Attendance History</h2>
      <form class="row g-2 mb-3" method="get" action="/history">
        <div class="col-auto">
          <label for="date" class="col-form-label">Date (MM_DD_YY)</label>
        </div>
        <div class="col-auto">
          <input class="form-control" id="date" name="date" value="{{ date_key }}" placeholder="MM_DD_YY">
        </div>
        <div class="col-auto">
          <button class="btn btn-primary" type="submit">Load</button>
        </div>
        <div class="col-auto">
          <a class="btn btn-secondary" href="/export?date={{ date_key }}">Export CSV</a>
        </div>
        <div class="col-auto">
          <form method="post" action="/clear" onsubmit="return confirm('Clear attendance for ' + document.getElementById('date').value + '?')">
            <input type="hidden" name="date" value="{{ date_key }}" />
            <button class="btn btn-danger" type="submit">Clear</button>
          </form>
        </div>
        <div class="col-auto">
          <a class="btn btn-outline-dark" href="/">Back</a>
        </div>
      </form>
      <p class="text-muted">Showing: {{ datetoday2 }}</p>
      <table class="table table-striped">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Roll Number</th>
            <th>Timing</th>
          </tr>
        </thead>
        <tbody>
          {% for i in range(l) %}
          <tr>
            <td>{{ i + 1 }}</td>
            <td>{{ names[i] }}</td>
            <td>{{ rolls[i] }}</td>
            <td>{{ times[i] }}</td>
          </tr>
          {% endfor %}
          {% if l == 0 %}
          <tr>
            <td colspan="4" class="text-center text-muted">No records for this date.</td>
          </tr>
          {% endif %}
        </tbody>
      </table>
    </div>
  </body>
  </html>
